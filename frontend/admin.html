<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Novuna Electronics</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* ===== VARIABLES ===== */
    :root {
      --primary: #088178;
      --primary-dark: #06655e;
      --accent-coral: #FF6B6B;
      --accent-gold: #FFB74D;
      --accent-gold-dark: #FFA000;
      --secondary: #1a1a1a;
      --light: #f8f8f8;
      --gray: #e8e8e8;
      --gray-dark: #606063;
      --danger: #dc2626;
      --danger-light: #ef4444;
      --success: #28a745;
      --warning: #ffc107;
      --shadow: 0 5px 15px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.1);
      --radius: 4px;
      --transition: all 0.3s ease;
    }

    /* ===== RESET & BASE STYLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f5f5f5;
      color: var(--secondary);
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      outline: none;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ccc;
      border-radius: var(--radius);
      font-size: 14px;
      transition: var(--transition);
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(8, 129, 120, 0.2);
    }

    /* ===== BUTTONS ===== */
    .normal {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 14px;
      transition: var(--transition);
      cursor: pointer;
      background: var(--primary);
      color: white;
      border: none;
    }

    .normal:hover {
      background: var(--primary-dark);
    }

    .btn-accent {
      background: var(--accent-coral);
      color: white;
    }

    .btn-accent:hover {
      background: #FF5252;
    }

    .btn-gold {
      background: var(--accent-gold);
      color: #111;
    }

    .btn-gold:hover {
      background: var(--accent-gold-dark);
    }

    /* ===== HEADER ===== */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 5%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 5px 15px rgba(8, 129, 120, 0.3);
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .logo {
      height: 40px;
    }

    #navbar {
      display: flex;
      align-items: center;
      list-style: none;
      gap: 30px;
      transition: var(--transition);
    }

    #navbar a {
      font-weight: 600;
      padding: 8px 0;
      position: relative;
      transition: var(--transition);
      color: white;
    }

    #navbar a.active {
      color: var(--accent-gold);
    }

    #navbar a.active::after,
    #navbar a:hover::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: var(--accent-gold);
    }

    #mobile {
      display: none;
      align-items: center;
      gap: 15px;
    }

    #mobile i {
      font-size: 20px;
      cursor: pointer;
      color: white;
    }

    #close {
      display: none;
    }

    /* ===== MODALS ===== */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal-content {
      background-color: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 500px;
      padding: 30px;
      position: relative;
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
      color: var(--gray-dark);
      transition: var(--transition);
    }

    .close-modal:hover {
      color: var(--accent-coral);
    }

    .modal h3 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      color: var(--primary);
    }

    .modal p {
      margin-bottom: 20px;
      color: var(--gray-dark);
    }

    /* ===== FORMS ===== */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--secondary);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    /* ===== SECTIONS ===== */
    .section-p1 {
      padding: 40px 5%;
    }

    #checkout {
      background-color: white;
      margin: 20px 5%;
    }

    .checkout-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .checkout-form h3,
    .order-summary h3 {
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--gray);
      color: var(--primary);
    }

    .order-summary {
      background-color: var(--light);
      padding: 25px;
      border-radius: var(--radius);
      height: fit-content;
    }

    #manage-products {
      background-color: white;
      margin: 20px 5%;
    }

    #manage-products h2 {
      margin-bottom: 30px;
      color: var(--primary);
      text-align: center;
    }

    /* ===== PENDING ORDERS SECTION ===== */
    #pending-orders {
      background-color: white;
      margin: 20px 5%;
      padding: 40px;
    }

    #pending-orders h2 {
      margin-bottom: 30px;
      color: var(--primary);
      text-align: center;
    }

    .orders-stats {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 200px;
      padding: 20px;
      background: var(--light);
      border-radius: var(--radius);
      text-align: center;
      border-left: 4px solid var(--primary);
    }

    .stat-card h3 {
      font-size: 2em;
      color: var(--primary);
      margin-bottom: 5px;
    }

    .stat-card p {
      color: var(--gray-dark);
      font-weight: 600;
    }

    .orders-container {
      display: grid;
      gap: 20px;
    }

    /* ===== PRODUCT CARDS ===== */
    .pro-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 25px;
    }

    .Pro {
      background-color: white;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: var(--transition);
      border: 1px solid var(--gray);
    }

    .Pro:hover {
      box-shadow: var(--shadow-lg);
    }

    .Pro img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .des {
      padding: 15px;
    }

    .des span {
      font-weight: 600;
      font-size: 16px;
      display: block;
      margin-bottom: 5px;
    }

    .des h5 {
      color: var(--gray-dark);
      font-weight: 500;
      margin-bottom: 10px;
    }

    .des h4 {
      color: var(--primary);
      font-weight: 700;
    }

    .Pro .btn-container {
      display: flex;
      gap: 10px;
      padding: 0 15px 15px;
    }

    /* ===== RECENT PRODUCTS ===== */
    #recent-products {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    #recent-products .Pro {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    #recent-products .Pro img {
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }

    #recent-products .des {
      padding: 0;
      flex-grow: 1;
    }

    /* ===== TOAST NOTIFICATION ===== */
    .auth-notification {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10000;
      background: var(--primary);
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      font-weight: 600;
      font-size: 14px;
    }

    .auth-notification.error {
      background: var(--danger);
    }

    .auth-notification.success {
      background: var(--primary);
    }

    /* ===== ADMIN CONTENT (HIDDEN WHEN NOT AUTHENTICATED) ===== */
    .admin-content {
      display: none;
    }

    /* ===== UPDATED FOOTER STYLES ===== */
    #contact {
      background: linear-gradient(135deg, #1a2a2a, #0a1a1a);
      color: #fff;
      padding: 60px 40px 30px;
      margin-top: 60px;
    }

    .footer-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer-col {
      flex: 1 1 200px;
    }

    .footer-col h3 {
      color: var(--accent-gold);
      margin-bottom: 20px;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      position: relative;
    }

    .footer-col h3::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-gold), var(--accent-coral));
    }

    .footer-col ul {
      list-style: none;
    }

    .footer-col ul li {
      margin-bottom: 10px;
    }

    .footer-col ul li a {
      color: #ccc;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
    }

    .footer-col ul li a:hover {
      color: var(--accent-coral);
      transform: translateX(5px);
    }

    .footer-col p {
      font-size: 15px;
      color: #bbb;
      margin-bottom: 10px;
    }

    .footer-col p strong {
      color: var(--accent-gold);
    }

    .socials {
      display: flex;
      gap: 15px;
      margin-top: 15px;
    }

    .socials a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      color: var(--accent-gold);
      transition: all 0.3s ease;
    }

    .socials a:hover {
      background: var(--accent-coral);
      color: white;
      transform: translateY(-3px);
    }

    .footer-bottom {
      text-align: center;
      margin-top: 40px;
      border-top: 1px solid rgba(255, 183, 77, 0.2);
      padding-top: 20px;
      font-size: 14px;
      color: #888;
    }

    .footer-bottom span {
      color: var(--accent-gold);
    }

    /* ===== RESPONSIVE DESIGN ===== */
    @media (max-width: 992px) {
      .checkout-container {
        grid-template-columns: 1fr;
      }

      .order-summary {
        order: -1;
      }

      .orders-stats {
        flex-direction: column;
      }

      .stat-card {
        min-width: auto;
      }
    }

    @media (max-width: 768px) {
      #navbar {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        position: fixed;
        top: 0;
        right: -300px;
        height: 100vh;
        width: 280px;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        box-shadow: -5px 0 25px rgba(0, 0, 0, 0.3);
        padding: 80px 0 30px 30px;
        transition: right 0.3s ease;
        z-index: 9999;
        overflow-y: auto;
        margin: 0;
        list-style: none;
        gap: 0;
      }

      #navbar.active {
        right: 0;
        display: flex !important;
      }

      #navbar li {
        width: 100%;
        margin: 0;
        padding: 0;
        list-style: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      #navbar li a {
        color: white !important;
        font-size: 16px;
        font-weight: 500;
        padding: 15px 25px;
        display: block;
        width: 100%;
        text-decoration: none;
        transition: all 0.3s ease;
        box-sizing: border-box;
      }

      #navbar li a:hover,
      #navbar li a.active {
        background: rgba(255, 255, 255, 0.1);
        padding-left: 30px;
      }

      #navbar li a.active::after,
      #navbar li a:hover::after {
        display: none;
      }

      #close {
        display: block;
        position: absolute;
        top: 20px;
        left: 20px;
        font-size: 24px;
        color: var(--accent-gold);
        cursor: pointer;
        z-index: 10000;
      }

      #mobile {
        display: flex;
      }

      #bar {
        display: block !important;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 576px) {
      .section-p1,
      #checkout,
      #manage-products,
      #pending-orders {
        padding: 20px;
        margin: 10px;
      }

      .modal-content {
        padding: 20px;
      }

      .pro-container {
        grid-template-columns: 1fr;
      }

      .footer-container {
        flex-direction: column;
        gap: 30px;
      }

      .footer-col {
        text-align: center;
      }

      .footer-col h3::after {
        left: 50%;
        transform: translateX(-50%);
      }

      .socials {
        justify-content: center;
      }
    }

    /* Admin Logout Button */
    #admin-logout {
      color: var(--accent-coral) !important;
    }

    #admin-logout:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>

  <!-- ADMIN LOGIN MODAL -->
  <div id="admin-login-modal" class="modal" style="display:flex; z-index: 10001;">
    <div class="modal-content">
      <span class="close-modal" id="close-login-modal">&times;</span>

      <h3 style="color:#088178;"><i class="fas fa-lock"></i> Admin Access</h3>
      <p>Enter your admin password to continue</p>

      <form id="admin-login-form">
        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="normal"
          style="width:100%; margin-bottom:10px; background:linear-gradient(135deg, #088178, #06655e);">Login</button>
        <button type="button" id="forgot-password-btn" class="normal"
          style="width:100%; background: #FFB74D; color: #1a1a1a;">Forgot Password</button>
      </form>
    </div>
  </div>

  <!-- ADMIN CONTENT (HIDDEN UNTIL AUTHENTICATED) -->
  <div class="admin-content">
    <!-- EDIT PRODUCT MODAL -->
    <div id="edit-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3><i class="fas fa-edit"></i> Edit Product</h3>

        <form id="edit-product-form">
          <input type="hidden" id="edit-product-id" name="id" />

          <div class="form-grid">
            <div class="form-group">
              <label>Name *</label>
              <input type="text" id="edit-name" name="name" required />
            </div>

            <div class="form-group">
              <label>Category *</label>
              <input type="text" id="edit-category" name="category" required />
            </div>

            <div class="form-group">
              <label>Price *</label>
              <input type="number" id="edit-price" name="price" required />
            </div>

            <div class="form-group">
              <label>Stock *</label>
              <input type="number" id="edit-stock" name="stock" required min="0" />
            </div>

            <div class="form-group">
              <label>Change Image</label>
              <input type="file" id="edit-image" name="image" accept="image/*" />
            </div>

            <div class="form-group full">
              <label>Description</label>
              <textarea id="edit-description" name="description"></textarea>
            </div>
          </div>

          <button type="submit" class="normal" style="margin-top:20px; background:linear-gradient(135deg, #088178, #06655e);"><i class="fa fa-save"></i> Update Product</button>
        </form>
      </div>
    </div>

    <!-- HEADER -->
    <section id="header">
      <a href="index.html"><img src="img4.png" class="logo" alt="Novuna Electronics" /></a>

      <ul id="navbar">
        <li><a href="#" id="close"><i class="fa fa-times"></i></a></li>
        <li><a href="index.html">Home</a></li>
        <li><a href="admin.html" class="active">Admin</a></li>
      </ul>

      <div id="mobile">
        <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
        <i id="bar" class="fas fa-outdent"></i>
      </div>
    </section>

    <!-- PENDING ORDERS SECTION -->
    <section id="pending-orders" class="section-p1">
      <h2>Pending Orders</h2>

      <div class="orders-actions">
        <button class="normal" onclick="clearCompletedOrders()"
          style="background: linear-gradient(135deg, #dc2626, #b91c1c);"><i class="fas fa-trash"></i> Clear Completed
          Orders</button>
      </div>

      <div class="orders-stats">
        <div class="stat-card">
          <h3 id="pending-count">0</h3>
          <p>Pending Orders</p>
        </div>
        <div class="stat-card">
          <h3 id="total-orders-count">0</h3>
          <p>Total Orders</p>
        </div>
        <div class="stat-card">
          <h3 id="total-revenue">UGX 0</h3>
          <p>Expected Revenue</p>
        </div>
      </div>

      <div class="orders-container" id="pending-orders-list">
        <!-- Orders will be loaded here dynamically -->
      </div>
    </section>

    <!-- ADD PRODUCT -->
    <section id="checkout" class="section-p1">
      <div class="checkout-container">
        <div class="checkout-form">
          <h3 style="color:#1a1a1a;">Add New Product</h3>

          <form id="admin-product-form" enctype="multipart/form-data">
            <div class="form-grid">
              <div class="form-group">
                <label>Name *</label>
                <input type="text" id="name" name="name" required />
              </div>

              <div class="form-group">
                <label>Category *</label>
                <input type="text" id="category" name="category" required />
              </div>

              <div class="form-group">
                <label>Price (UGX) *</label>
                <input type="number" id="price" name="price" required />
              </div>

              <div class="form-group">
                <label>Stock *</label>
                <input type="number" id="stock" name="stock" required min="0" value="0" />
              </div>

              <div class="form-group">
                <label>Product image *</label>
                <input type="file" id="image" name="image" accept="image/*" required />
              </div>

              <div class="form-group full">
                <label>Description</label>
                <textarea id="description" name="description"></textarea>
              </div>
            </div>

            <button type="submit" class="normal" style="background:linear-gradient(135deg, #088178, #06655e);"><i
                class="fa fa-plus"></i> Add Product</button>
          </form>
        </div>

        <div class="order-summary">
          <h3 style="color:#1a1a1a;">Recently Added</h3>
          <div id="recent-products"></div>
        </div>
      </div>
    </section>

    <!-- MANAGE PRODUCTS -->
    <section id="manage-products" class="section-p1">
      <h2 style="color:#1a1a1a;">Manage Products</h2>
      <div id="products-list" class="pro-container"></div>
    </section>
  </div>

  <script src="api.js"></script>
  <script src="admin.js"></script>
  <script src="script.js"></script>
  <script src="auth.js"></script>

</body>

</html>
